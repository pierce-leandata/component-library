@if (selectedHtml(); as html) {
  <span
    data-select-value
    [innerHTML]="html"
    [id]="id"
    [class]="valueClass()"
    [style]="valueStyle()"
  ></span>
} @else {
  <span data-select-placeholder [id]="id" [class]="placeholderClass()" [style]="placeholderStyle()"
    ><ng-content
  /></span>
}
