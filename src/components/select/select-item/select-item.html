<li
  #label
  data-select-item
  role="option"
  [id]="id"
  [attr.data-focused]="isFocused()"
  [attr.data-selected]="isSelected()"
  [attr.aria-selected]="isSelected()"
  (click)="onSelect()"
  (keydown)="onKeyDown($event)"
  (mousemove)="onMouseMove()"
  [tabindex]="-1"
>
  <ng-content />
</li>
