@if (selectService.isOverlayMounted()) {
  <div
    #overlayElement
    data-select-overlay
    [attr.data-select-overlay-appended-to-body]="selectService.appendToBody()"
    [attr.data-state]="selectService.isOpen() ? 'open' : 'closed'"
    [attr.data-align]="align()"
    [attr.data-side]="positioning().computedSide"
    [style]="{ left: positioning().left, top: positioning().top, position: positioning().position }"
    [id]="selectService.overlayId"
    (mousedown)="$event.preventDefault()"
  >
    <ul data-select-list role="listbox">
      <ng-content />
    </ul>
  </div>
}
